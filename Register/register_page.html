<!DOCTYPE html>

<html>
    
    <head>

        <title>rentME - Registrieren</title>
        <link rel="stylesheet" href="register_style.css">


        <link href="https://fonts.googleapis.com/css?family=Montserrat:700&display=swap" rel="stylesheet">

    </head>

    <body>

        <div id="register_container">

            <h2 id="label_register">Registrieren</h1>

            <form id="form_register">
    
                <input type="text" id="textfield_forname" class="textfield" placeholder="Vorname">
                <input type="text" id="textfield_lastname" class="textfield" placeholder="Nachname">
                <input type="text" id="textfield_email" class="textfield" placeholder="E-Mail">
                <input type="text" id="textfield_number" class="textfield" placeholder="Telefonnummer">
                <input type="text" id="textfield_username" class="textfield" placeholder="Gewünschter Benutzername">
                <input type="text" id="textfield_street" class="textfield" placeholder="Straße">
                <input type="text" id="textfield_housenumber" class="textfield" placeholder="Hausnummer">

                <input type="submit" id="button_register" value="Registrieren">
    
            </form>

        </div>

    </body>

</html>

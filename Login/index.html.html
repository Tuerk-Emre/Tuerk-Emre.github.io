<!DOCTYPE html>
<html>

    <head>
        <title>rentME - Login</title>

        <link rel="stylesheet" href="login_style.css">
        <link href="https://fonts.googleapis.com/css?family=Montserrat:700&display=swap" rel="stylesheet">
    </head<>

    <body>

        <div id="login_container">
            <h1 id="label_title">rentME - Login</h1>
            <form id="form_login">
                <input type="text" id="textfield_username" class="textfield" placeholder="Benutzername oder E-Mail">
                <input type="password" id="textfield_password" class="textfield" placeholder="Passwort">
                <input type="submit" id="button_login" value="Login">
                <input type="button" id="button_register" value="Registrieren">
            </form>
        
        </div>

        <script src="login.js"></script>
    </body>

</html>
